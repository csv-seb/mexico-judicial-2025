<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elecciones Judiciales 2025 — Buscador Semántico</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    
    <style>
        /* TUS VARIABLES DE COLOR ORIGINALES */
        :root {
            --gold: #C9A84C;
            --gold-dim: #8a6f30;
            --ink: #0b0b0f;
            --ink2: #141418;
            --ink3: #1e1e25;
            --cream: #f5f0e8;
            --cream-dim: #b8b0a0;
            --red-mx: #c41e22;
            --green-mx: #006847;
            --accent: #e8d5a3;
            --text: #e8e4dc;
            --muted: #7a7870;
            --border: rgba(201, 168, 76, 0.2);
        }

        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            background-color: var(--ink);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
        }

        /* TIPOGRAFÍA HEADER */
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        header {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(to bottom, var(--ink2), var(--ink));
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        header p {
            color: var(--cream-dim);
            max-width: 600px;
            margin: 0 auto;
            font-weight: 300;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* SECCIÓN DE ESTADÍSTICAS CORREGIDAS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: -3rem auto 3rem auto;
            position: relative;
            z-index: 10;
        }

        .stat-box {
            background-color: var(--ink3);
            border: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .stat-number {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--cream-dim);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* FILTROS Y BÚSQUEDA */
        .filters-section {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 3rem;
            background-color: var(--ink2);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--ink);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            border-radius: 4px;
            outline: none;
        }

        .filter-group input:focus, .filter-group select:focus {
            border-color: var(--gold);
        }

        /* GRID DE CANDIDATOS */
        #candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .candidate-card {
            background-color: var(--ink2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .candidate-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 20px rgba(201, 168, 76, 0.1);
        }

        .view-more-btn {
            margin-top: auto;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 0.6rem 1rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .view-more-btn:hover {
            background: var(--gold);
            color: var(--ink);
        }

        /* PAGINACIÓN */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 4rem;
        }

        .pagination button {
            background-color: var(--ink3);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .pagination button:hover:not(:disabled) {
            background-color: var(--gold);
            color: var(--ink);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* MODAL (TU CÓDIGO ORIGINAL) */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 11, 15, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #modal-overlay.open {
            display: flex;
        }

        .modal-content {
            background: var(--ink2);
            border: 1px solid var(--border);
            padding: 3rem;
            max-width: 600px;
            width: 90%;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 1.5rem;
            color: var(--gold);
            cursor: pointer;
            background: none;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Elecciones Judiciales 2025</h1>
        <p>Buscador Semántico impulsado por IA para analizar las propuestas y ensayos de los candidatos.</p>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-number">3369</span>
                <span class="stat-label">Candidatos Publicados</span>
            </div>
            <div class="stat-box">
                <span class="stat-number">881</span>
                <span class="stat-label">Cargos a Elegir</span>
            </div>
            <div class="stat-box">
                <span class="stat-number">33</span>
                <span class="stat-label">Entidades representadas</span>
            </div>
            <div class="stat-box">
                <span class="stat-number">64</span>
                <span class="stat-label">Candidatos a la SCJN</span>
            </div>
        </div>

        <div class="filters-section">
            <div class="filter-group" style="flex: 2;">
                <input type="text" id="search-input" placeholder="Búsqueda semántica (ej. justicia social, derechos humanos)...">
            </div>
            <div class="filter-group">
                <select id="filter-cargo">
                    <option value="">Todos los cargos</option>
                    <option value="Magistrada">Magistrado/a</option>
                    <option value="Jueza">Juez/a</option>
                    <option value="Ministra">Ministro/a</option>
                </select>
            </div>
            <div class="filter-group">
                <select id="filter-sexo">
                    <option value="">Cualquier género</option>
                    <option value="Mujer">Mujer</option>
                    <option value="Hombre">Hombre</option>
                </select>
            </div>
        </div>

        <div id="candidates-grid">
            </div>

        <div class="pagination">
            <button id="prev-btn" disabled>Anterior</button>
            <span id="page-info" style="color: var(--muted); font-family: 'DM Mono', monospace;">Página 1</span>
            <button id="next-btn">Siguiente</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">✖</button>
            <span id="modal-pillar" style="color:var(--gold); font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;"></span>
            <h2 id="modal-name" style="margin: 0.5rem 0; color: var(--text);"></h2>
            <p id="modal-role" style="color: var(--gold-dim); margin-bottom: 1.5rem; font-style: italic;"></p>
            <div style="border-top: 1px solid var(--border); padding-top: 1.5rem;">
                <h3 style="font-family: 'DM Sans', sans-serif; font-size: 1rem; margin-bottom: 0.5rem; color: var(--cream);">Ensayo / Visión</h3>
                <p id="modal-vision" style="color: var(--muted); font-size: 0.95rem; white-space: pre-wrap;"></p>
            </div>
        </div>
    </div>

    <script>
        let allCandidates = [];
        let filteredCandidates = [];
        let currentPage = 1;
        const itemsPerPage = 8; 

        // 1. CARGAR DATOS
        async function loadData() {
            try {
                const response = await fetch('candidates_data.json');
                const data = await response.json();
                
                allCandidates = data.candidates;
                filteredCandidates = [...allCandidates];
                
                renderCandidates();
            } catch (error) {
                console.error("Error cargando NLP:", error);
                document.getElementById('candidates-grid').innerHTML = '<p style="color:var(--red-mx); grid-column:1/-1;">Error al cargar datos. Asegúrate de compilar el Python.</p>';
            }
        }

        // 2. FILTRADO Y BÚSQUEDA SEMÁNTICA
        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const cargo = document.getElementById('filter-cargo').value.toLowerCase();
            const sexo = document.getElementById('filter-sexo').value;

            filteredCandidates = allCandidates.filter(c => {
                const matchSearch = search === '' || `${c.name} ${c.vision} ${c.propuesta} ${c.pillar}`.toLowerCase().includes(search);
                const matchCargo = cargo === '' || (c.role && c.role.toLowerCase().includes(cargo));
                const matchSexo = sexo === '' || (c.gender && c.gender === sexo);
                return matchSearch && matchCargo && matchSexo;
            });

            currentPage = 1;
            renderCandidates();
        }

        // 3. RENDERIZAR GRID (Diseño Gold & Ink)
        function renderCandidates() {
            const grid = document.getElementById('candidates-grid');
            grid.innerHTML = '';

            if (filteredCandidates.length === 0) {
                grid.innerHTML = '<p style="color: var(--muted); grid-column: 1/-1; text-align:center;">No se encontraron candidatos afines a esta búsqueda semántica.</p>';
                document.getElementById('page-info').textContent = "Página 0 de 0";
                return;
            }

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageItems = filteredCandidates.slice(startIndex, endIndex);

            pageItems.forEach(c => {
                const card = document.createElement('div');
                card.className = 'candidate-card';
                
                const shortVision = c.vision ? c.vision.substring(0, 120) + '...' : 'Sin ensayo registrado.';

                card.innerHTML = `
                    <span style="font-size:0.75rem; text-transform:uppercase; color:var(--gold); letter-spacing:1px; margin-bottom:0.5rem; display:block;">
                        ⚖️ ${c.pillar} | Score: ${c.score}
                    </span>
                    <h3 style="color: var(--text); margin-bottom: 0.2rem;">${c.name}</h3>
                    <p style="color: var(--gold-dim); font-size: 0.9rem; margin-bottom: 1rem;">${c.role}</p>
                    <p style="color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem;">${shortVision}</p>
                    <button class="view-more-btn" onclick='openModal(${JSON.stringify(c).replace(/'/g, "&apos;")})'>Ver Perfil Completo</button>
                `;
                grid.appendChild(card);
            });

            // Actualizar Paginación
            const totalPages = Math.ceil(filteredCandidates.length / itemsPerPage);
            document.getElementById('page-info').textContent = `Página ${currentPage} de ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage >= totalPages;
        }

        // 4. LÓGICA DEL MODAL
        function openModal(candidato) {
            document.getElementById('modal-name').textContent = candidato.name;
            document.getElementById('modal-role').textContent = candidato.role;
            document.getElementById('modal-pillar').textContent = `Pilar de IA: ${candidato.pillar}`;
            document.getElementById('modal-vision').textContent = candidato.vision || "No proporcionó ensayo.";
            document.getElementById('modal-overlay').classList.add('open');
        }

        document.getElementById('modal-close').addEventListener('click', () => {
            document.getElementById('modal-overlay').classList.remove('open');
        });
        document.getElementById('modal-overlay').addEventListener('click', e => {
            if (e.target === document.getElementById('modal-overlay')) {
                document.getElementById('modal-overlay').classList.remove('open');
            }
        });

        // 5. EVENT LISTENERS
        ['search-input','filter-cargo','filter-sexo'].forEach(id => {
            document.getElementById(id).addEventListener('input', applyFilters);
            document.getElementById(id).addEventListener('change', applyFilters);
        });

        document.getElementById('prev-btn').addEventListener('click', () => { 
            if(currentPage > 1) { currentPage--; renderCandidates(); window.scrollTo(0, 300); }
        });
        document.getElementById('next-btn').addEventListener('click', () => { 
            const totalPages = Math.ceil(filteredCandidates.length / itemsPerPage);
            if(currentPage < totalPages) { currentPage++; renderCandidates(); window.scrollTo(0, 300); }
        });

        // INICIAR
        loadData();
    </script>
</body>
</html>
